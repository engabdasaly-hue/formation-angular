on:
  push:
    paths:
      - file1.txt
jobs:
  translate_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write #allow Github actions to push to repo
    steps:
      - name: checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Translate file1.txt to file3.txt
        run: python translate_script.py

      - name: Commit and Push file3.txt
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@users.noreply.github.com'
          git add file3.txt
          git commit -m "Auto translate file1.txt to file3.txt" || echo "No changes to commit"
          git push
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN}}
